name: Deploy Backend - Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "config/**"
      - "requirements.txt"
      - "runtime.txt"
      - "startup.sh"
      - ".github/workflows/deploy-backend-app-service.yml"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  PACKAGE_PATH: backend-package

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Validate backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend

      - name: Build deployment package
        run: |
          mkdir -p "${PACKAGE_PATH}"
          rsync -av \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude ".env" \
            --exclude "uploads" \
            --exclude "cache" \
            --exclude "outbox" \
            backend startup.sh requirements.txt runtime.txt config "${PACKAGE_PATH}/"

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ${{ env.PACKAGE_PATH }}
