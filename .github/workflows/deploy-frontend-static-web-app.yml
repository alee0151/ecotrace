name: Deploy Frontend - Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "fronend/**"
      - ".github/workflows/deploy-frontend-static-web-app.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: fronend/package-lock.json

      - name: Install frontend dependencies
        working-directory: fronend
        run: npm ci

      - name: Build frontend
        working-directory: fronend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm run build
          cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: fronend/dist
          output_location: ""
          skip_app_build: true
